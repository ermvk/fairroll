services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fairroll
      POSTGRES_PASSWORD: fairroll
      POSTGRES_DB: fairroll
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U fairroll" ]
      interval: 5s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_DSN: postgres://fairroll:fairroll@postgres:5432/fairroll?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: