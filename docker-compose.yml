services:
  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fairroll
      POSTGRES_PASSWORD: fairroll
      POSTGRES_DB: fairroll_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U fairroll" ]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-wallet:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fairroll
      POSTGRES_PASSWORD: fairroll
      POSTGRES_DB: fairroll_wallet
    ports:
      - "5433:5432"
    volumes:
      - postgres_wallet_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U fairroll" ]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092" ]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-init:
    image: apache/kafka:3.8.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic user.events --partitions 1 --replication-factor 1

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SERVICE_NAME: auth-service
      SERVICE_PORT: "8080"
      DATABASE_DSN: postgres://fairroll:fairroll@postgres-auth:5432/fairroll_auth?sslmode=disable
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres-auth:
        condition: service_healthy
      kafka:
        condition: service_healthy

  wallet:
    build:
      context: .
      dockerfile: services/wallet/Dockerfile
    ports:
      - "8081:8081"
    environment:
      SERVICE_NAME: wallet-service
      SERVICE_PORT: "8081"
      DATABASE_DSN: postgres://fairroll:fairroll@postgres-wallet:5432/fairroll_wallet?sslmode=disable
      KAFKA_BROKERS: kafka:9092
    depends_on:
      postgres-wallet:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  postgres_auth_data:
  postgres_wallet_data:
  kafka_data: